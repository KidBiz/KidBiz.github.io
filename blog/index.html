<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Insights for Parents | KidBiz Academy</title>
<meta name="description" content="Practical thinking for parents on how children actually discover what they love — grounded in RIASEC and real classroom experience.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%AD%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Mitr:wght@400;500;600&family=Fraunces:ital,wght@0,400;0,500;0,600&family=Noto+Serif+Thai:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--teal:#00B1CB;--teal-d:#0090a8;--teal-soft:#EAFAFC;--magenta:#AD1A70;--ink:#1A1A1A;--zinc:#5A5A66;--line:#EAECF0;--bg:#FCFBF8}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Poppins','Mitr',sans-serif;color:var(--ink);background:var(--bg);line-height:1.7;-webkit-font-smoothing:antialiased}
  body.th{font-family:'Mitr','Poppins',sans-serif}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  .wrap{max-width:960px;margin:0 auto;padding:0 24px}

  nav{border-bottom:1px solid var(--line);background:rgba(252,251,248,.9);backdrop-filter:blur(8px);position:sticky;top:0;z-index:10}
  .nav-in{max-width:960px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:'Poppins',sans-serif;font-weight:700;font-size:18px}
  
  .logo b{color:var(--teal)}
  .nav-right{display:flex;align-items:center;gap:14px}
  .back{font-size:14px;color:var(--zinc)}
  .back:hover{color:var(--teal-d)}
  .lang{display:inline-flex;background:#F1F3F5;border-radius:100px;padding:3px}
  .langbtn{border:none;background:none;font-family:inherit;font-weight:700;font-size:12px;color:var(--zinc);padding:5px 11px;border-radius:100px;cursor:pointer}
  .langbtn.on{background:#fff;color:var(--teal-d);box-shadow:0 1px 4px rgba(0,0,0,.1)}

  header.top{text-align:center;padding:62px 0 40px}
  .eyebrow{font-weight:700;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--teal-d)}
  h1{font-family:'Fraunces','Noto Serif Thai',Georgia,serif;font-weight:600;font-size:clamp(30px,4.4vw,42px);line-height:1.2;margin:14px 0 12px}
  body.th h1{font-family:'Noto Serif Thai','Fraunces',serif}
  header.top p{font-size:17px;color:var(--zinc);max-width:560px;margin:0 auto}

  .ins-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,360px));gap:22px;justify-content:center;padding-bottom:70px}
  .ins-card{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;display:block;transition:transform .18s,box-shadow .18s}
  .ins-card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(24,24,27,.10)}
  .ins-card img{width:100%;aspect-ratio:3/2;object-fit:cover;background:#ece9e2}
  .ins-body{padding:22px 24px}
  .ins-body .k{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--teal-d);margin-bottom:8px}
  .ins-body h3{font-family:'Fraunces','Noto Serif Thai',serif;font-weight:600;font-size:20px;line-height:1.3;margin-bottom:8px}
  body.th .ins-body h3{font-family:'Noto Serif Thai','Fraunces',serif}
  .ins-body p{font-size:14.5px;color:var(--zinc)}
  .soon{opacity:.55;pointer-events:none}
  .soon .ins-body h3{color:var(--zinc)}

  .cta{background:linear-gradient(150deg,var(--teal),#0993ab 60%,var(--magenta));color:#fff;border-radius:22px;padding:44px 30px;text-align:center;margin-bottom:60px}
  .cta h3{font-family:'Fraunces','Noto Serif Thai',serif;font-weight:600;color:#fff;font-size:26px;margin-bottom:10px}
  body.th .cta h3{font-family:'Noto Serif Thai','Fraunces',serif}
  .cta p{color:rgba(255,255,255,.9);font-size:16px;margin-bottom:18px}
  .cta a{display:inline-block;background:#fff;color:var(--teal-d);font-weight:700;padding:12px 26px;border-radius:100px;font-size:15px}
  footer{padding:34px 0;text-align:center;color:var(--zinc);font-size:13px;border-top:1px solid var(--line)}
</style>
</head>
<body>

<nav><div class="nav-in">
  <a href="../index.html" class="logo">Kid<b>Biz</b> Academy</a>
  <div class="nav-right">
    <a href="../index.html" class="back" data-en="← Back to camp" data-th="← กลับหน้าค่าย"></a>
    <div class="lang">
      <button class="langbtn" data-l="en" onclick="setLang('en')">EN</button>
      <button class="langbtn" data-l="th" onclick="setLang('th')">ไทย</button>
    </div>
  </div>
</div></nav>

<header class="top"><div class="wrap">
  <div class="eyebrow" data-en="Insights" data-th="บทความ"></div>
  <h1 data-en="Thinking for parents, not marketing" data-th="แนวคิดสำหรับพ่อแม่ ไม่ใช่โฆษณา"></h1>
  <p data-en="What we've learned about how children actually discover what they love — free to read, nothing to sign up for." data-th="สิ่งที่เราเรียนรู้ว่าเด็กค้นพบสิ่งที่ตัวเองรักได้ยังไงจริง ๆ — อ่านฟรี ไม่ต้องสมัครอะไร"></p>
</div></header>

<div class="wrap">
  <div class="ins-grid">

    <a class="ins-card" href="why-what-do-you-love.html">
      <img src="img/observe.png" alt="" onerror="this.style.display='none'">
      <div class="ins-body">
        <div class="k" data-en="For parents" data-th="สำหรับผู้ปกครอง"></div>
        <h3 data-en="Why &ldquo;What Do You Love?&rdquo; Never Gets a Straight Answer" data-th="ทำไม &ldquo;หนูชอบอะไร&rdquo; ถึงไม่เคยได้คำตอบจริง"></h3>
        <p data-en="Little kids have no words. Older kids perform. Here's where a child's real interests actually hide — and how to read them at home." data-th="เด็กเล็กไม่มีคำจะตอบ เด็กโตตอบแบบแสดง แล้วความสนใจจริงของเด็กซ่อนอยู่ตรงไหน — พร้อมวิธีอ่านที่บ้าน"></p>
      </div>
    </a>

    <div class="ins-card soon">
      <div class="ins-body" style="padding-top:26px">
        <div class="k" data-en="Coming soon" data-th="เร็ว ๆ นี้"></div>
        <h3 data-en="RIASEC: a compass for your child's interests" data-th="RIASEC — เข็มทิศค้นหาความสนใจของลูก"></h3>
        <p data-en="The six leanings, what each looks like in a real child, and the careers they point toward." data-th="6 สาย แต่ละสายหน้าตาเป็นยังไงในเด็กจริง และชี้ไปอาชีพอะไรบ้าง"></p>
      </div>
    </div>

    <div class="ins-card soon">
      <div class="ins-body" style="padding-top:26px">
        <div class="k" data-en="Coming soon" data-th="เร็ว ๆ นี้"></div>
        <h3 data-en="Why teaching kids to save never sticks" data-th="ทำไมสอนลูกออมเงินแล้วไม่ติด"></h3>
        <p data-en="In a child's world, money isn't real money yet. Here's what changes that." data-th="ในโลกของเด็ก เงินยังไม่ใช่เงินจริง แล้วอะไรที่เปลี่ยนเรื่องนี้ได้"></p>
      </div>
    </div>

  </div>

  <div class="cta">
    <h3 data-en="Ready to see it in action?" data-th="อยากเห็นของจริงไหม"></h3>
    <p data-en="Two days, kids 9–15, a business of their own — and a personal First Read to take home." data-th="สองวัน เด็ก 9–15 ปี ได้สร้างธุรกิจของตัวเอง พร้อม First Read เฉพาะตัวกลับบ้าน"></p>
    <a href="../index.html" data-en="See how the camp works →" data-th="ดูว่าค่ายเป็นยังไง →"></a>
  </div>
</div>

<footer><div class="wrap" data-en="KidBiz Academy · where kids discover who they are, through business" data-th="KidBiz Academy · ค่ายค้นหาตัวตน ผ่านโลกธุรกิจ"></div></footer>

<script>
  function setLang(l){
    if(l!=='th') l='en';
    document.documentElement.lang = l;
    document.body.classList.toggle('th', l==='th');
    document.querySelectorAll('[data-en]').forEach(function(el){
      var v = el.getAttribute('data-'+l); if(v!==null) el.innerHTML = v;
    });
    document.querySelectorAll('.langbtn').forEach(function(b){ b.classList.toggle('on', b.dataset.l===l); });
    try{ localStorage.setItem('kidbiz_lang', l); }catch(e){}
  }
  setLang((function(){ try{ return localStorage.getItem('kidbiz_lang'); }catch(e){ return null; } })() || 'en');
</script>
</body>
</html>
